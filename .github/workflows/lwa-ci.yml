name: LWA CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  frontend-checks:
    name: Frontend Type-Check Build Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./lwa-web
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./lwa-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

  backend-checks:
    name: Backend Compile & Offline Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./lwa-backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: ./lwa-backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile Python files
        run: python3 -m compileall app scripts

      - name: Run offline generation test
        run: python3 scripts/test_offline_generation.py

  repo-checks:
    name: Git Whitespace Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for whitespace errors
        run: git diff --check

      - name: Verify no emoji in Lee-Wuh
        run: |
          if grep -r "🦁\|🧠\|⚡\|🎯\|😎\|🎮" lwa-web/components/lee-wuh/ 2>/dev/null; then
            echo "ERROR: Emoji found in Lee-Wuh components"
            exit 1
          fi
          echo "Lee-Wuh emoji check passed"
